name = "teamwork-legacy-archive-navigator"
main = "worker/index.js"
compatibility_date = "2026-04-08"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

# After running `npx wrangler d1 create teamwork-legacy-archive-db`,
# add the returned block below and keep `binding = "DB"`:
#
# [[d1_databases]]
# binding = "DB"
# database_name = "teamwork-legacy-archive-db"
# database_id = "<paste-d1-database-id>"
